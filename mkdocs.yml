site_name: Spec-Driven Development
site_description: Guía en español sobre Spec-Driven Development con AI coding agents
site_author: jmlopezdona
site_url: https://jmlopezdona.github.io/ai-coding-agents-sdd/
repo_url: https://github.com/jmlopezdona/ai-coding-agents-sdd
repo_name: jmlopezdona/ai-coding-agents-sdd
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Introduction:
      - "Spec-Driven Development: building software with intent": 00-spec-driven-development.md
  - The problem:
      - "1. From vibe coding to SDD": 01-from-vibe-coding-to-sdd.md
  - Foundations:
      - "2. The specification spectrum": 02-specification-spectrum.md
      - "3. Anatomy of a good spec": 03-anatomy-of-a-spec.md
      - "4. The spec in context": 04-spec-in-context.md
  - Lifecycle:
      - "5. Possible lifecycle approaches": 05-sdd-lifecycles.md
      - "6. Living specs": 06-living-specs.md
  - Tooling:
      - "7. SDD tools": 07-native-sdd-tools.md
  - Putting it to work:
      - "8. Patterns of application": 08-patterns-of-application.md
      - "9. The honest critique": 09-honest-critique.md
      - "10. Code-embedded context": 10-context-engineering.md
      - "11. Anti-patterns": 11-anti-patterns.md
  - What's next:
      - "12. From discipline to the software factory": 12-from-sdd-to-harness.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Enlace permanente a esta sección
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search:
      lang:
        - en
        - es
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          site_name: Spec-Driven Development
          nav_translations:
            "Home": "Inicio"
            "Introduction": "Introducción"
            "Spec-Driven Development: building software with intent": "Spec-Driven Development: producir software con intención"
            "1. From vibe coding to SDD": "1. Del vibe coding al SDD"
            "The problem": "El problema"
            "Foundations": "Fundamentos"
            "2. The specification spectrum": "2. El espectro de la especificación"
            "3. Anatomy of a good spec": "3. Anatomía de una buena especificación"
            "4. The spec in context": "4. La spec en contexto"
            "Lifecycle": "Ciclo de vida"
            "5. Possible lifecycle approaches": "5. Posibles enfoques del ciclo de vida"
            "6. Living specs": "6. Especificaciones vivas"
            "Tooling": "Herramientas"
            "7. SDD tools": "7. Herramientas SDD"
            "Putting it to work": "Puesta en práctica"
            "8. Patterns of application": "8. Patrones de aplicación"
            "9. The honest critique": "9. La crítica honesta"
            "10. Code-embedded context": "10. Code-embedded context: la otra cara de la moneda"
            "11. Anti-patterns": "11. Anti-patrones"
            "What's next": "Qué sigue"
            "12. From discipline to the software factory": "12. De la disciplina a la fábrica de software"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jmlopezdona/ai-coding-agents-sdd
